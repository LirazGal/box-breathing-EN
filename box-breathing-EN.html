<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Breathing · Relax</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #1a2a3a;
    --bg2: #2d4a5c;
    --accent: #7fd4c8;
    --accent-soft: rgba(127, 212, 200, 0.25);
    --text: #e8f1f2;
    --text-soft: rgba(232, 241, 242, 0.65);
  }

  html, body { height: 100%; }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 30px 20px;
    text-align: center;
    overflow-x: hidden;
  }

  h1 {
    font-weight: 300;
    font-size: 1.6rem;
    letter-spacing: 1px;
    color: var(--text);
  }

  .subtitle {
    color: var(--text-soft);
    font-size: 0.95rem;
    margin-top: -18px;
  }

  /* --- visual breathing box --- */
  .stage {
    position: relative;
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid var(--accent-soft);
    border-radius: 28px;
  }

  .box {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    background: radial-gradient(circle at 30% 30%, var(--accent), #4a9d92);
    box-shadow: 0 0 40px var(--accent-soft);
    transition: transform linear;
    transform: scale(0.55);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phase-label {
    font-size: 1.15rem;
    font-weight: 400;
    color: #08313b;
    user-select: none;
  }

  .countdown {
    font-size: 2.6rem;
    font-weight: 200;
    min-height: 3.2rem;
    color: var(--text);
  }

  /* --- controls --- */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: center;
    width: 100%;
    max-width: 340px;
  }

  .slider-row {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-row label {
    color: var(--text-soft);
    font-size: 0.95rem;
  }

  .slider-row .val { color: var(--accent); font-weight: 600; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px var(--accent-soft);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .duration-row {
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .duration-row label {
    color: var(--text-soft);
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  #durInput {
    font-family: inherit;
    font-size: 1rem;
    width: 56px;
    text-align: center;
    padding: 5px 4px;
    border: 1px solid rgba(127,212,200,0.4);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--accent);
    font-weight: 600;
  }
  #durInput:focus { outline: none; border-color: var(--accent); }

  button#toggleBtn {
    font-family: inherit;
    font-size: 1.05rem;
    padding: 12px 40px;
    border: 1px solid var(--accent);
    border-radius: 30px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  button#toggleBtn:hover { background: var(--accent); color: #08313b; }

  .buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button.secondary {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 12px 28px;
    border: 1px solid var(--text-soft);
    border-radius: 30px;
    background: transparent;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  button.secondary:hover { border-color: var(--text); color: var(--text); }

  .time-left {
    color: var(--text-soft);
    font-size: 1.05rem;
    min-height: 1.4rem;
    letter-spacing: 0.5px;
  }
  .time-left span { color: var(--accent); font-weight: 600; }

  .hint {
    color: var(--text-soft);
    font-size: 0.85rem;
    max-width: 320px;
    line-height: 1.5;
  }

  /* --- music toggle --- */
  .music-toggle {
    position: fixed;
    top: 18px;
    right: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--text-soft);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(127,212,200,0.3);
    border-radius: 24px;
    padding: 8px 14px;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s ease;
  }
  .music-toggle:hover { border-color: var(--accent); color: var(--text); }
  .music-toggle .icon { font-size: 1.1rem; line-height: 1; }
  .music-toggle.on {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--text);
  }

  #ytPlayer { position: absolute; width: 0; height: 0; overflow: hidden; left: -9999px; }
</style>
</head>
<body>

  <div class="music-toggle" id="musicToggle" title="Background music">
    <span class="icon" id="musicIcon">🔇</span>
    <span id="musicLabel">Music</span>
  </div>

  <div id="ytPlayer"></div>

  <h1>Box Breathing</h1>
  <p class="subtitle">Inhale · Hold · Exhale · Hold</p>

  <div class="stage">
    <div class="ring"></div>
    <div class="box" id="box">
      <span class="phase-label" id="phaseLabel">Ready?</span>
    </div>
  </div>

  <div class="countdown" id="countdown"></div>

  <div class="controls">
    <div class="slider-row">
      <label>Seconds per phase: <span class="val" id="secVal">4</span></label>
      <input type="range" id="secSlider" min="2" max="10" step="1" value="4">
    </div>

    <div class="duration-row" id="durationRow">
      <label>How long to practice? <input type="number" id="durInput" min="1" max="60" step="1" value="5"> minutes</label>
    </div>

    <p class="time-left" id="timeLeft"></p>

    <div class="buttons">
      <button id="toggleBtn">Start</button>
      <button id="restartBtn" class="secondary" style="display:none;">Restart</button>
    </div>
  </div>

  <p class="hint">Find a comfortable position. Follow the square: as it grows - inhale, as it shrinks - exhale. You can change the number of seconds at any time.</p>

<script>
  const phases = [
    { name: "Inhale", scale: 1.0,  big: true  },
    { name: "Hold",   scale: 1.0,  big: true  },
    { name: "Exhale", scale: 0.55, big: false },
    { name: "Hold",   scale: 0.55, big: false }
  ];

  const box = document.getElementById("box");
  const phaseLabel = document.getElementById("phaseLabel");
  const countdownEl = document.getElementById("countdown");
  const secSlider = document.getElementById("secSlider");
  const secVal = document.getElementById("secVal");
  const toggleBtn = document.getElementById("toggleBtn");
  const restartBtn = document.getElementById("restartBtn");
  const durInput = document.getElementById("durInput");
  const durationRow = document.getElementById("durationRow");
  const timeLeftEl = document.getElementById("timeLeft");

  let running = false;
  let phaseIndex = 0;
  let phaseTimer = null;
  let tickTimer = null;

  let sessionTimer = null;
  let sessionCountdown = null;
  let secondsRemaining = 0;

  secSlider.addEventListener("input", () => {
    secVal.textContent = secSlider.value;
  });

  function totalMinutesValue() {
    const v = parseInt(durInput.value, 10);
    return (isNaN(v) || v < 1) ? 0 : v;
  }

  function fmt(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ":" + String(s).padStart(2, "0");
  }

  function seconds() { return parseInt(secSlider.value, 10); }

  function startPhase() {
    const phase = phases[phaseIndex];
    const dur = seconds();

    phaseLabel.textContent = phase.name;
    box.style.transition = `transform ${dur}s linear`;
    box.style.transform = `scale(${phase.scale})`;

    // countdown
    let remaining = dur;
    countdownEl.textContent = remaining;
    clearInterval(tickTimer);
    tickTimer = setInterval(() => {
      remaining--;
      if (remaining >= 0) countdownEl.textContent = remaining;
    }, 1000);

    phaseTimer = setTimeout(() => {
      phaseIndex = (phaseIndex + 1) % phases.length;
      startPhase();
    }, dur * 1000);
  }

  function clearTimers() {
    clearTimeout(phaseTimer);
    clearInterval(tickTimer);
    clearTimeout(sessionTimer);
    clearInterval(sessionCountdown);
  }

  function start() {
    running = true;
    toggleBtn.textContent = "Stop";
    restartBtn.style.display = "inline-block";
    durationRow.style.display = "none";
    phaseIndex = 0;
    startPhase();

    const totalMinutes = totalMinutesValue();
    if (totalMinutes > 0) {
      secondsRemaining = totalMinutes * 60;
      timeLeftEl.innerHTML = "Time left: <span>" + fmt(secondsRemaining) + "</span>";
      sessionCountdown = setInterval(() => {
        secondsRemaining--;
        timeLeftEl.innerHTML = "Time left: <span>" + fmt(Math.max(secondsRemaining, 0)) + "</span>";
        if (secondsRemaining <= 0) finish();
      }, 1000);
      sessionTimer = setTimeout(() => finish(), totalMinutes * 60 * 1000);
    } else {
      timeLeftEl.textContent = "";
    }
  }

  // Full stop - back to the start screen
  function stop() {
    running = false;
    clearTimers();
    toggleBtn.textContent = "Start";
    toggleBtn.style.display = "inline-block";
    restartBtn.style.display = "none";
    durationRow.style.display = "flex";
    box.style.transition = "transform 0.8s ease";
    box.style.transform = "scale(0.55)";
    phaseLabel.textContent = "Ready?";
    countdownEl.textContent = "";
    timeLeftEl.textContent = "";
  }

  // Chosen time has ended
  function finish() {
    running = false;
    clearTimers();
    box.style.transition = "transform 0.8s ease";
    box.style.transform = "scale(0.55)";
    phaseLabel.textContent = "Well done 🌿";
    countdownEl.textContent = "";
    timeLeftEl.innerHTML = "<span>Session complete</span>";
    toggleBtn.style.display = "none";
    restartBtn.style.display = "inline-block";
    durationRow.style.display = "none";
  }

  toggleBtn.addEventListener("click", () => {
    running ? stop() : start();
  });

  restartBtn.addEventListener("click", () => {
    clearTimers();
    start();
  });

  /* ---------- Background music (YouTube) ---------- */
  const VIDEO_ID = "1ZYbU82GVz4";
  const musicToggle = document.getElementById("musicToggle");
  const musicIcon = document.getElementById("musicIcon");
  const musicLabel = document.getElementById("musicLabel");

  let ytPlayer = null;
  let ytReady = false;
  let musicOn = false;

  // Load the YouTube IFrame API
  (function loadYT() {
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  })();

  window.onYouTubeIframeAPIReady = function () {
    ytPlayer = new YT.Player("ytPlayer", {
      videoId: VIDEO_ID,
      playerVars: {
        autoplay: 0,
        controls: 0,
        loop: 1,
        playlist: VIDEO_ID   // required for loop to work on a single video
      },
      events: {
        onReady: () => {
          ytReady = true;
          ytPlayer.setVolume(45);
          if (musicOn) ytPlayer.playVideo();
        }
      }
    });
  };

  function setMusic(on) {
    musicOn = on;
    if (on) {
      musicIcon.textContent = "🔊";
      musicLabel.textContent = "Music on";
      musicToggle.classList.add("on");
      if (ytReady) ytPlayer.playVideo();
    } else {
      musicIcon.textContent = "🔇";
      musicLabel.textContent = "Music";
      musicToggle.classList.remove("on");
      if (ytReady) ytPlayer.pauseVideo();
    }
  }

  musicToggle.addEventListener("click", () => setMusic(!musicOn));
</script>
</body>
</html>
